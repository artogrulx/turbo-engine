<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>

    <!-- THREE.js -->
    <script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>

    <!-- Pointer Lock Controls -->
    <script src="https://unpkg.com/three@0.150.0/examples/js/controls/PointerLockControls.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body style="margin:0; overflow:hidden; background:black;">

    <!-- ⭐ GAME AREA (FULLSCREEN, CLICKABLE, FOCUSABLE) ⭐ -->
    <div id="game-container"
         style="width:100vw; height:100vh; outline:none; position:relative;">
    </div>

    <!-- ⭐ UI LAYER (does NOT block clicks) ⭐ -->
    <div id="ui-layer" style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        pointer-events:none;   /* ⭐ IMPORTANT ⭐ */
    ">

        <!-- Hotbar -->
        <div id="hotbar" style="pointer-events:none;">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
            <div class="slot" id="slot-4"></div>
            <div class="slot" id="slot-5"></div>
            <div class="slot" id="slot-6"></div>
            <div class="slot" id="slot-7"></div>
            <div class="slot" id="slot-8"></div>
        </div>

        <!-- Inventory -->
        <div id="inventory" style="pointer-events:none;">
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>

            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>

            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
            <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>

    </div>

    <script src="main.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
